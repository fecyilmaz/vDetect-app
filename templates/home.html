<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .welcome-title { font-size: 3em; color: #333; margin-bottom: 20px; opacity: 0; animation: fadeIn 1s forwards; }
        .welcome-subtitle { font-size: 1.2em; color: #666; margin-bottom: 40px; opacity: 0; animation: fadeIn 1s forwards 0.5s; }
        .nav-link { display: inline-block; margin: 10px; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; transition: background-color 0.3s; opacity: 0; animation: fadeIn 1s forwards 1s; }
        .nav-link:hover { background-color: #0056b3; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="welcome-title">Plaka ve Araç Tanıma Uygulamasına Hoş Geldiniz</h1>
        <p class="welcome-subtitle">Video dosyalarını kolayca yükleyin, analiz edin ve sonuçları görüntüleyin.</p>
        <a href="{{ url_for('upload_file') }}" class="nav-link">Video Yükle ve Analiz Et</a>
        <a href="{{ url_for('about') }}" class="nav-link">Hakkında</a>
        <a href="{{ url_for('contact') }}" class="nav-link">İletişim</a>
    </div>
</body>
</html>
